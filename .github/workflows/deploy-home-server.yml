name: Deploy Home Server

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: yaocihuatl
          POSTGRES_PASSWORD: test-password
          POSTGRES_DB: yaocihuatl_test
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U yaocihuatl -d yaocihuatl_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - "6379:6379"
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      APP_ENV: test
      DATABASE_URL: postgresql://yaocihuatl:test-password@localhost:5432/yaocihuatl_test
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET: test-only-secret-with-more-than-thirty-two-bytes
      RUN_MIGRATIONS_ON_START: "false"
      SEED_DEMO_DATA: "false"
      LOCAL_EVIDENCE_STORAGE_PATH: /tmp/yaocihuatl-evidence
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Frontend checks
        run: |
          npm ci
          npm run lint
          npm run typecheck
          npm run build

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Backend tests
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"
          pytest -q

  deploy:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOME_SERVER_HOST }}
          username: ${{ secrets.HOME_SERVER_USER }}
          key: ${{ secrets.HOME_SERVER_SSH_KEY }}
          port: ${{ secrets.HOME_SERVER_PORT }}
          script_stop: true
          script: |
            set -euo pipefail

            APP_DIR="${{ secrets.HOME_SERVER_PATH }}"
            REPO_URL="git@github.com:LexHackersClub/Yaocihuatl.git"
            BRANCH="${{ github.ref_name }}"

            mkdir -p "$APP_DIR"

            if [ ! -d "$APP_DIR/.git" ]; then
              GIT_SSH_COMMAND="ssh -i ~/.ssh/github_deploy -o StrictHostKeyChecking=no" \
                git clone --branch "$BRANCH" "$REPO_URL" "$APP_DIR"
            fi

            cd "$APP_DIR"
            GIT_SSH_COMMAND="ssh -i ~/.ssh/github_deploy -o StrictHostKeyChecking=no" \
              git fetch origin "$BRANCH"
            git checkout "$BRANCH"
            git reset --hard "origin/$BRANCH"

            if [ ! -f .env ]; then
              echo "ERROR: Missing $APP_DIR/.env — create it on the server before deploying."
              exit 1
            fi

            docker compose -f docker-compose.prod.yml up -d --build --remove-orphans

            echo "Waiting for backend to be healthy..."
            timeout 120 sh -c 'until curl -fsS http://127.0.0.1:8000/health > /dev/null 2>&1; do sleep 4; done'

            docker compose -f docker-compose.prod.yml exec -T backend \
              python -m app.seed.demo_data || echo "Seed step skipped or already done"

            curl -fsS http://127.0.0.1:8000/health
            curl -fsS http://127.0.0.1:3000 >/dev/null

            docker image prune -f
