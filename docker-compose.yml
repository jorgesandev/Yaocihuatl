  #     MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-change-me-in-production}
  #   ports:
  #     - "9000:9000"
  #     - "9001:9001"
  #   volumes:
  #     - minio-data:/data
  #   networks:
  #     - yaocihuatl-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: yaocihuatl-backend
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-development}
      PORT: ${BACKEND_PORT:-8000}
      DATABASE_URL: postgresql://${POSTGRES_USER:-yaocihuatl}:${POSTGRES_PASSWORD:-change-me-in-production}@postgres:5432/${POSTGRES_DB:-yaocihuatl}
      REDIS_URL: redis://:${REDIS_PASSWORD:-}@redis:6379/0
    ports:
      - "${BACKEND_PORT:-8000}:${BACKEND_PORT:-8000}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    networks:
      - yaocihuatl-net

