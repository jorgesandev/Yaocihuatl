  #   volumes:
  #     - ./backend:/app
  #   networks:
  #     - yaocihuatl-net

networks:
  yaocihuatl-net:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  frontend-node-modules:
  backend-evidence-storage:
  # minio-data:
