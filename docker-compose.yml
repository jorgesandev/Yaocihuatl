  #   command: server /data --console-address ":9001"
  #   environment:
  #     MINIO_ROOT_USER: ${MINIO_ROOT_USER:-admin}
  #     MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-change-me-in-production}
  #   ports:
  #     - "9000:9000"
  #     - "9001:9001"
  #   volumes:
  #     - minio-data:/data
  #   networks:
  #     - yaocihuatl-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: yaocihuatl-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-development}
      PORT: ${BACKEND_PORT:-8000}
      DATABASE_URL: postgresql://${POSTGRES_USER:-yaocihuatl}:${POSTGRES_PASSWORD:-change-me-in-production}@postgres:5432/${POSTGRES_DB:-yaocihuatl}
      REDIS_URL: redis://:${REDIS_PASSWORD:-}@redis:6379/0
      RUN_MIGRATIONS_ON_START: ${RUN_MIGRATIONS_ON_START:-true}
      SEED_DEMO_DATA: ${SEED_DEMO_DATA:-true}
      DEMO_SEED_VERSION: ${DEMO_SEED_VERSION:-2026-05-initial}
      LOCAL_EVIDENCE_STORAGE_PATH: ${LOCAL_EVIDENCE_STORAGE_PATH:-/app/storage/evidence}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-480}
    ports:
      - "${BACKEND_PORT:-8000}:${BACKEND_PORT:-8000}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - backend-evidence-storage:/app/storage/evidence
    networks:
      - yaocihuatl-net

  frontend:
    image: node:20-alpine
    container_name: yaocihuatl-frontend
    working_dir: /workspace
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      NEXT_TELEMETRY_DISABLED: "1"
    command: sh -c "npm install && npm run dev -- --hostname 0.0.0.0 --port ${FRONTEND_PORT:-3000}"
    ports:
      - "${FRONTEND_PORT:-3000}:${FRONTEND_PORT:-3000}"
    depends_on:
      backend:
        condition: service_started
    volumes:
      - ./:/workspace
      - frontend-node-modules:/workspace/node_modules
    networks:
      - yaocihuatl-net

  # worker:
  #   build:
  #     context: ./backend
  #     dockerfile: Dockerfile
  #   container_name: yaocihuatl-worker
  #   restart: unless-stopped
